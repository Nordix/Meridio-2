include "bird-common.conf";


protocol static DEFAULT4 {
	ipv4 { preference 110; };
	route 0.0.0.0/0 blackhole;
}

protocol static DEFAULT6 {
	ipv6 { preference 110; };
	route ::/0 blackhole;
}

# Do not sync blackhole routes into OS kernel.
# Export everything (VIP routes) learned through BGP neighbors.
filter gw_kernel_export {
	if source = RTS_STATIC && dest = RTD_BLACKHOLE then reject;
	else accept;
}

filter gw_kernel_export6 {
	if source = RTS_STATIC && dest = RTD_BLACKHOLE then reject;
	else accept;
}

filter bgp_announce {
	if ( net ~ [ 0.0.0.0/0 ] ) then accept;
	if source = RTS_STATIC && dest = RTD_BLACKHOLE then accept;
	else reject;
}

filter bgp_announce6 {
	if ( net ~ [ ::/0 ] ) then accept;
	if source = RTS_STATIC && dest = RTD_BLACKHOLE then accept;
	else reject;
}

protocol kernel {
	ipv4 {
		import none;
		export filter gw_kernel_export;
	};
	merge paths on;
}

protocol kernel {
	ipv6 {
		import none;
		export filter gw_kernel_export6;
	};
	merge paths on;
}


# separate-appnetwork gw-a1 peers on VLAN 100 (ASN 64512)
# Also used by dual-stack gw-ds (both IPv4 and IPv6)
protocol bgp GW4_A1 from LINK {
	local 169.254.10.150 port 10179 as 4200000000;
	neighbor range 0.0.0.0/0 port 10179 as 64512;
	dynamic name "GW4_A1_";
	ipv4 {
		import all;
		export filter bgp_announce;
	};
}

# dual-stack gw-ds IPv6 on VLAN 100 (ASN 64512, shared with gw-a1)
protocol bgp GW6_DS from LINK {
	local fd00:cafe:10::150 port 10179 as 4200000000;
	neighbor range ::/0 port 10179 as 64512;
	dynamic name "GW6_DS_";
	ipv6 {
		import all;
		export filter bgp_announce6;
	};
}

