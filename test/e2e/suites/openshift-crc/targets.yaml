---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-ocp
  labels:
    app: target-ocp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: target-ocp
  template:
    metadata:
      labels:
        app: target-ocp
      annotations:
        k8s.v1.cni.cncf.io/networks: app-net
    spec:
      serviceAccountName: meridio-2-network-sidecar
      volumes:
      - name: sidecar-state
        emptyDir: {}
      containers:
      - name: example-target
        image: registry.nordix.org/cloud-native/meridio-2/example-target:latest
        imagePullPolicy: Always
        command: ["/bin/bash", "-c"]
        args:
        - |
          screen -d -m bash -c "./ctraffic -server -address [::]:5000" ;
          screen -d -m bash -c "./ctraffic -server -udp -address [::]:5001" ;
          trap 'exit 0' TERM; sleep infinity & wait
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["DAC_OVERRIDE", "NET_RAW", "SYS_PTRACE"]
      - name: network-sidecar
        image: registry.nordix.org/cloud-native/meridio-2/network-sidecar:latest
        imagePullPolicy: Always
        args:
        - --pod-name=$(POD_NAME)
        - --pod-namespace=$(POD_NAMESPACE)
        - --pod-uid=$(POD_UID)
        - --log-level=debug
        volumeMounts:
        - name: sidecar-state
          mountPath: /var/run/meridio
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_ADMIN"]
