apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: e2e-ipv4-simple

resources:
- ../../../../config/default

images:
- name: controller-manager
  newName: registry.nordix.org/cloud-native/meridio-2/controller-manager
  newTag: latest

nameSuffix: -ipv4-simple

labels:
- pairs:
    e2e-suite: ipv4-simple

patches:
- patch: |-
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: not-important
      annotations:
        cert-manager.io/inject-ca-from: e2e-ipv4-simple/meridio-2-serving-cert-ipv4-simple
    webhooks:
    - name: vl34route-v1alpha1.kb.io
      namespaceSelector:
        matchLabels:
          e2e-suite: ipv4-simple
      clientConfig:
        service:
          name: meridio-2-webhook-service-ipv4-simple
          namespace: e2e-ipv4-simple
  target:
    kind: ValidatingWebhookConfiguration
- patch: |-
    - op: replace
      path: /spec/dnsNames
      value:
      - meridio-2-webhook-service-ipv4-simple.e2e-ipv4-simple.svc
      - meridio-2-webhook-service-ipv4-simple.e2e-ipv4-simple.svc.cluster.local
    - op: replace
      path: /spec/secretName
      value: webhook-server-cert-ipv4-simple
  target:
    group: cert-manager.io
    kind: Certificate
    name: serving-cert
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: not-important
    spec:
      template:
        spec:
          containers:
          - name: manager
            env:
            - name: MERIDIO_LB_SERVICE_ACCOUNT
              value: meridio-2-stateless-load-balancer-ipv4-simple
          volumes:
          - name: webhook-certs
            secret:
              secretName: webhook-server-cert-ipv4-simple
  target:
    kind: Deployment
    labelSelector: control-plane=controller-manager
