---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-m1
spec:
  gatewayClassName: meridio
  infrastructure:
    parametersRef:
      group: meridio-2.nordix.org
      kind: GatewayConfiguration
      name: gwconfig-m1
  listeners:
  - name: default
    protocol: TCP
    port: 80
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayConfiguration
metadata:
  name: gwconfig-m1
spec:
  networkAttachments:
  - type: NAD
    nad:
      name: sysctl-tuning
      namespace: e2e-ipv4-simple
      interface: dummy
  - type: NAD
    nad:
      name: vlan-700
      namespace: e2e-ipv4-simple
      interface: vlan-700
  - type: NAD
    nad:
      name: app-net-mtu1200
      namespace: e2e-ipv4-simple
      interface: net-m
  internalSubnets:
  - attachmentType: NAD
    cidr: "169.111.40.0/24"
  horizontalScaling:
    replicas: 1
