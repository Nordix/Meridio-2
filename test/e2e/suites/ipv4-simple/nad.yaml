---
# Sysctl tuning NAD
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sysctl-tuning
spec:
  config: '{
      "cniVersion": "0.4.0",
      "name": "sysctl-tuning",
      "plugins": [
        {
          "type": "tuning",
          "prevResult": {},
          "sysctl": {
            "net.ipv4.conf.all.forwarding": "1",
            "net.ipv6.conf.all.forwarding": "1",
            "net.ipv4.fib_multipath_hash_policy": "1",
            "net.ipv6.fib_multipath_hash_policy": "1",
            "net.ipv4.conf.all.rp_filter": "2",
            "net.ipv4.conf.default.rp_filter": "2",
            "net.ipv4.fwmark_reflect": "1",
            "net.ipv6.fwmark_reflect": "1",
            "net.ipv4.ip_local_port_range": "49152 65535"
          }
        }
      ]
  }'
---
# VLAN 700 NAD for gw-m1 BGP peering
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-700
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 700,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.50.0/24", "exclude": ["169.254.50.150/32"] }
        ]
      }
    }
---
# App network with 1200 MTU (triggers PMTU discovery for packets > 1200)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-mtu1200
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-mtu1200",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "mtu": 1200,
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.40.0/24" }
            ]
          }
        }
      ]
    }
