---
# Sysctl tuning NAD
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sysctl-tuning
spec:
  config: '{
      "cniVersion": "0.4.0",
      "name": "sysctl-tuning",
      "plugins": [
        {
          "type": "tuning",
          "prevResult": {},
          "sysctl": {
            "net.ipv4.conf.all.forwarding": "1",
            "net.ipv6.conf.all.forwarding": "1",
            "net.ipv4.fib_multipath_hash_policy": "1",
            "net.ipv6.fib_multipath_hash_policy": "1",
            "net.ipv4.conf.all.rp_filter": "2",
            "net.ipv4.conf.default.rp_filter": "2",
            "net.ipv4.fwmark_reflect": "1",
            "net.ipv6.fwmark_reflect": "1"
          }
        }
      ]
  }'
---
# VLAN 900 NAD for gw-t1 BGP peering (TCP-AO suite)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-900
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 900,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.60.0/24", "range_start": "169.254.60.1", "range_end": "169.254.60.2", "exclude": ["169.254.60.150/32"] }
        ]
      }
    }
---
# VLAN 1000 NAD for gw-t2 BGP peering (TCP-AO suite)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-1000
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 1000,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.61.0/24", "range_start": "169.254.61.1", "range_end": "169.254.61.2", "exclude": ["169.254.61.150/32"] }
        ]
      }
    }
---
# Shared app network for both gw-t1 and gw-t2
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-t
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-t",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.60.0/24" }
            ]
          }
        }
      ]
    }
