---
# Secret containing TCP-AO master keys
apiVersion: v1
kind: Secret
metadata:
  name: bgp-tcpao-secret
type: Opaque
stringData:
  master-key-1: "my-secure-master-key-string"
  master-key-2: "my-new-master-key-for-rotation"
---
# gw-t1 router (VLAN 900, ASN 64520)
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-t1-router-v4
spec:
  gatewayRef:
    name: gw-t1
  interface: "vlan-900"
  address: "169.254.60.150"
  protocol: "BGP"
  bgp:
    localASN: 64520
    remoteASN: 4200000000
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    authentication:
      keychain:
        - sendId: 1
          recvId: 1
          algorithm: hmac sha256
          secretName: bgp-tcpao-secret
          secretKey: master-key-1
      currentKeyId: 1
    bfd:
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: L34Route
metadata:
  name: route-t1
spec:
  parentRefs:
  - name: gw-t1
  backendRefs:
  - group: meridio-2.nordix.org
    kind: DistributionGroup
    name: dg-t1
  destinationCIDRs:
  - "60.0.0.1/32"
  protocols:
  - TCP
  - UDP
  destinationPorts:
  - "5000-5001"
  priority: 100
---
# gw-t2 router (VLAN 1000, ASN 64521)
apiVersion: meridio-2.nordix.org/v1alpha1
kind: GatewayRouter
metadata:
  name: gw-t2-router-v4
spec:
  gatewayRef:
    name: gw-t2
  interface: "vlan-1000"
  address: "169.254.61.150"
  protocol: "BGP"
  bgp:
    localASN: 64521
    remoteASN: 4200000000
    localPort: 10179
    remotePort: 10179
    holdTime: 24s
    authentication:
      keychain:
        - sendId: 1
          recvId: 1
          algorithm: hmac sha256
          secretName: bgp-tcpao-secret
          secretKey: master-key-1
      currentKeyId: 1
    bfd:
      minTx: 300ms
      minRx: 300ms
      multiplier: 3
---
apiVersion: meridio-2.nordix.org/v1alpha1
kind: L34Route
metadata:
  name: route-t2
spec:
  parentRefs:
  - name: gw-t2
  backendRefs:
  - group: meridio-2.nordix.org
    kind: DistributionGroup
    name: dg-t2
  destinationCIDRs:
  - "60.0.0.2/32"
  protocols:
  - TCP
  - UDP
  destinationPorts:
  - "5000-5001"
  priority: 100
