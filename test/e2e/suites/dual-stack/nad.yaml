---
# Sysctl tuning NAD
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sysctl-tuning
spec:
  config: '{
      "cniVersion": "0.4.0",
      "name": "sysctl-tuning",
      "plugins": [
        {
          "type": "tuning",
          "prevResult": {},
          "sysctl": {
            "net.ipv4.conf.all.forwarding": "1",
            "net.ipv6.conf.all.forwarding": "1",
            "net.ipv4.fib_multipath_hash_policy": "1",
            "net.ipv6.fib_multipath_hash_policy": "1",
            "net.ipv4.conf.all.rp_filter": "2",
            "net.ipv4.conf.default.rp_filter": "2",
            "net.ipv4.fwmark_reflect": "1",
            "net.ipv6.fwmark_reflect": "1",
            "net.ipv4.ip_local_port_range": "49152 65535"
          }
        }
      ]
  }'
---
# VLAN 100 NAD for dual-stack BGP peering (reuses separate-appnetwork VLAN)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-100
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "vlan",
      "master": "eth0",
      "vlanId": 100,
      "ipam": {
        "type": "whereabouts",
        "ipRanges": [
          { "range": "169.254.100.0/24", "exclude": ["169.254.100.150/32"] },
          { "range": "fd00:cafe:100::/64", "exclude": ["fd00:cafe:100::150/128"] }
        ]
      }
    }
---
# Dual-stack app network
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: app-net-ds
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "app-net-ds",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "ipRanges": [
              { "range": "169.111.103.0/24" },
              { "range": "fd00:cafe:103::/64" }
            ]
          }
        }
      ]
    }
