---
# ClusterRole for cluster-scoped resources only.
# GatewayClass is cluster-scoped and must be accessible
# regardless of --namespace.
#
# RBAC: This file is hand-maintained. Update when controller permissions change.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-clusterrole
  labels:
    app.kubernetes.io/name: meridio-2
    app.kubernetes.io/component: controller-manager
rules:
# Gateway controller: resolve Gateway.spec.gatewayClassName
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses
  verbs:
  - get
  - list
  - watch
